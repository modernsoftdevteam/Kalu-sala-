<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KALU AI - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        
        body, html { 
            height: 100%; margin: 0; 
            font-family: 'Hind Siliguri', sans-serif; 
            background-color: #0f172a; color: white; overflow: hidden; 
        }

        .app-wrapper { display: flex; flex-direction: column; height: 100vh; }

        header { 
            flex-shrink: 0; background: #1e293b; 
            border-bottom: 2px solid #3b82f6; padding: 12px 20px; 
            display: flex; align-items: center; justify-content: space-between;
        }

        #chatDisplay { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; 
            scroll-behavior: smooth;
        }

        /* চ্যাট বাবল ডিজাইন */
        .chat-bubble-owner { 
            align-self: flex-end; background: #2563eb; 
            padding: 12px 18px; border-radius: 20px 20px 2px 20px; 
            max-width: 80%; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2); 
        }

        .chat-bubble-kalu { 
            align-self: flex-start; background: #334155; 
            padding: 12px 18px; border-radius: 20px 20px 20px 2px; 
            max-width: 80%; border: 1px solid #475569; 
        }

        footer { 
            padding: 15px; background: #0f172a; 
            border-top: 1px solid #334155; 
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .input-group { 
            display: flex; gap: 10px; background: #1e293b; 
            padding: 5px 15px; border-radius: 30px; 
            border: 1px solid #3b82f6; align-items: center; 
        }

        input { 
            flex: 1; background: transparent; border: none; 
            color: white; outline: none; padding: 10px 0; font-size: 16px;
        }

        /* মাইক্রোফোন এনিমেশন */
        .mic-active { color: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .error-box { 
            background: #450a0a; border: 1px solid #f87171; 
            padding: 15px; border-radius: 15px; margin-top: 10px; 
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold shadow-lg">ক</div>
            <div>
                <h1 class="font-bold text-sm tracking-widest uppercase">Kalu AI</h1>
                <p id="status-text" class="text-blue-400 text-[10px] font-bold italic">সিস্টেম চেক হচ্ছে...</p>
            </div>
        </div>
        <div id="dot" class="w-2.5 h-2.5 bg-yellow-500 rounded-full"></div>
    </header>

    <main id="chatDisplay">
        <div class="chat-bubble-kalu" id="info-box">
            আসসালামু আলাইকুম <b>মালিক</b>। আমি কালু। আমি তৈরি হচ্ছি, একটু সময় দিন...
        </div>
    </main>

    <footer>
        <div class="input-group">
            <button id="micBtn" onclick="startListening()" class="text-xl opacity-30 cursor-pointer transition-all" disabled>🎙️</button>
            <input type="text" id="chatInput" placeholder="অপেক্ষা করুন..." disabled autocomplete="off">
            <button id="sendBtn" onclick="handleChat()" class="opacity-30 text-xl transition-all" disabled>🚀</button>
        </div>
    </footer>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const statusText = document.getElementById('status-text');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const infoBox = document.getElementById('info-box');
    const dot = document.getElementById('dot');
    const display = document.getElementById('chatDisplay');

    let engine;
    const modelId = "Qwen2-0.5B-Instruct-q4f16_1-MLC"; // ফাস্ট এবং পাওয়ারফুল মডেল

    // ১. কথা বলার ফাংশন
    function kaluSpeak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'bn-BD';
        utter.rate = 1.0;
        window.speechSynthesis.speak(utter);
    }

    // ২. কথা শোনার ফাংশন (Mic)
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    if (Recognition) {
        recognition = new Recognition();
        recognition.lang = 'bn-BD';
        recognition.onstart = () => { micBtn.classList.add('mic-active'); chatInput.placeholder = "শুনছি মালিক..."; };
        recognition.onresult = (e) => { chatInput.value = e.results[0][0].transcript; handleChat(); };
        recognition.onend = () => { micBtn.classList.remove('mic-active'); chatInput.placeholder = "হুকুম করুন মালিক..."; };
    }

    window.startListening = () => { if (recognition) recognition.start(); };

    // ৩. ইঞ্জিন ইনিশিয়ালাইজেশন
    async function init() {
        if (!navigator.gpu) {
            statusText.innerText = "WebGPU পাওয়া যায়নি!";
            dot.className = "w-2.5 h-2.5 bg-red-500 rounded-full";
            infoBox.innerHTML = `
                <div class="error-box">
                    <b class="text-red-400">⚠️ WebGPU ডিজেবল করা!</b>
                    <p class="text-xs mt-2">মালিক, chrome://flags এ গিয়ে WebGPU অপশনটি Enabled করে রি-লঞ্চ করুন।</p>
                </div>`;
            return;
        }

        try {
            statusText.innerText = "ডাউনলোড শুরু...";
            dot.className = "w-2.5 h-2.5 bg-blue-500 animate-pulse rounded-full";
            
            engine = await webllm.CreateMLCEngine(modelId, {
                initProgressCallback: (report) => {
                    let p = Math.round(report.progress * 100);
                    statusText.innerText = `ডাউনলোড: ${p}%`;
                    if (p === 100) ready();
                }
            });
        } catch (err) {
            statusText.innerText = "বাধাগ্রস্ত হয়েছে!";
            dot.className = "w-2.5 h-2.5 bg-red-500 rounded-full";
            infoBox.innerHTML = "<p class='text-red-400'>ইন্টারনেট কানেকশন বা চার্জ কম থাকায় কালু লোড হতে পারছে না। রিফ্রেশ দিন।</p>";
        }
    }

    function ready() {
        statusText.innerText = "অনলাইন ✅";
        statusText.style.color = "#22c55e";
        dot.className = "w-2.5 h-2.5 bg-green-500 rounded-full";
        
        chatInput.disabled = false;
        chatInput.placeholder = "হুকুম করুন মালিক...";
        sendBtn.disabled = false; sendBtn.classList.replace('opacity-30', 'opacity-100');
        micBtn.disabled = false; micBtn.classList.replace('opacity-30', 'opacity-100');
        
        infoBox.innerHTML = "আসসালামু আলাইকুম <b>মালিক</b>! আমি কালু, আপনার সেবায় নিয়োজিত।";
        kaluSpeak("আসসালামু আলাইকুম মালিক, আমি তৈরি");
    }

    window.handleChat = async function() {
        const text = chatInput.value.trim();
        if (!text || !engine) return;

        addMsg(text, 'chat-bubble-owner');
        chatInput.value = "";
        display.scrollTop = display.scrollHeight;

        try {
            const messages = [
                { role: "system", content: "তুমি মালিকের অনুগত সহকারী কালু। সবসময় মালিককে 'মালিক' বলবে। বাংলায় ছোট উত্তর দাও।" },
                { role: "user", content: text }
            ];
            const reply = await engine.chat.completions.create({ messages });
            const aiMsg = reply.choices[0].message.content;
            
            addMsg(`<b>কালু:</b> ${aiMsg}`, 'chat-bubble-kalu');
            kaluSpeak(aiMsg);
        } catch (e) {
            addMsg("দুঃখিত মালিক, আমি উত্তর খুঁজে পাচ্ছি না।", 'chat-bubble-kalu');
        }
    }

    function addMsg(html, className) {
        const div = document.createElement('div');
        div.className = className;
        div.innerHTML = html;
        display.appendChild(div);
        display.scrollTop = display.scrollHeight;
    }

    window.onload = init;
    chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") handleChat(); });
</script>
</body>
</html>
